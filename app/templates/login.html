<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NABS</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/bootstrap.min.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename='css/bootstrap-icons.min.css')}}">
    <!-- Favicons -->
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/favicons/apple-touch-icon.png') }}" sizes="180x180">
    <link rel="icon" href="{{ url_for('static', filename='images/favicons/favicon-32x32.png') }}" sizes="32x32" type="image/png">
    <link rel="icon" href="{{ url_for('static', filename='images/favicons/favicon-16x16.png') }}" sizes="16x16" type="image/png">
    <link rel="manifest" href="{{ url_for('static', filename='images/favicons/manifest.json') }}">
    <link rel="mask-icon" href="{{ url_for('static', filename='images/favicons/safari-pinned-tab.svg') }}" color="#7952b3">
    <link rel="icon" href="{{ url_for('static', filename='images/favicons/favicon.ico') }}">
    <style>
        :root {
            --bg-body-light: #f5f5f5;
            --bg-card-light: #ffffff;
            --text-light: #212529;
            --border-light: #dee2e6;
            --input-bg-light: #ffffff;
            --input-border-light: #ced4da;
        }
        [data-theme="dark"] {
            --bg-body-dark: #121212;
            --bg-card-dark: #1e1e1e;
            --text-dark: #e9ecef;
            --border-dark: #3a3f47;
            --input-bg-dark: #2c3034;
            --input-border-dark: #495057;
        }
        html, body { height: 100%; }
        body {
            background-color: var(--bg-body-light);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            margin: 0;
            transition: background-color 0.2s;
        }
        [data-theme="dark"] body {
            background-color: var(--bg-body-dark);
        }
        .login-card {
            background-color: var(--bg-card-light);
            border: 1px solid var(--border-light);
            border-radius: 0.5rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            transition: background-color 0.2s, border-color 0.2s;
        }
        [data-theme="dark"] .login-card {
            background-color: var(--bg-card-dark);
            border-color: var(--border-dark);
            color: #e9ecef;
        }
        /* Текст внутри карточки в тёмной теме */
        [data-theme="dark"] .login-card h1,
        [data-theme="dark"] .login-card h3,
        [data-theme="dark"] .login-card .h3,
        [data-theme="dark"] .login-card p {
            color: #f8f9fa;
        }
        [data-theme="dark"] .login-card .text-muted {
            color: #adb5bd !important;
        }
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
            transition: color 0.2s;
            z-index: 10;
        }
        [data-theme="dark"] .theme-toggle {
            color: var(--text-dark);
        }
        .theme-toggle:hover { color: #fa603e; }
        [data-theme="dark"] .form-floating > .form-control {
            background-color: var(--input-bg-dark);
            border-color: var(--input-border-dark);
            color: var(--text-dark);
        }
        [data-theme="dark"] .form-floating > .form-control:focus {
            border-color: #fa603e;
            box-shadow: 0 0 0 0.2rem rgba(250, 96, 62, 0.25);
        }
        [data-theme="dark"] .form-floating > label {
            color: #adb5bd;
        }
        .btn-primary {
            background-color: #e9ecef;
            border-color: #ced4da;
            color: #212529;
        }
        .btn-primary:hover {
            background-color: #dde2e6;
            border-color: #c1c9d0;
            color: #212529;
        }
        [data-theme="dark"] .btn-primary {
            background-color: #fa603e;
            border-color: #fa603e;
            color: #ffffff;
        }
        [data-theme="dark"] .btn-primary:hover {
            background-color: #e04e2e;
            border-color: #c94426;
            color: #ffffff;
        }
        .logo { max-width: 180px; width: 100%; height: auto; }
        @media (max-width: 576px) { .login-card { margin: 0 1rem; } }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggleBtn" title="Toggle theme"><i class="bi bi-moon-stars-fill"></i></button>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card login-card">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <img class="logo mb-3" src="{{ url_for('static', filename='images/nabs_logo_2_5.png') }}" alt="NABS logo">
                            <h1 class="h3 mb-3">Welcome to NABS</h1>
                            <p class="text-muted">Please log in to continue</p>
                        </div>
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div id="AlertMessage" class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        <form class="needs-validation" method="post" novalidate>
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="inputEmail" name="email" placeholder="Email address" required autofocus>
                                <label for="inputEmail">Email address</label>
                                <div class="invalid-feedback">Please enter a valid email.</div>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control" id="inputPassword" name="password" placeholder="Password" required>
                                <label for="inputPassword">Password</label>
                                <div class="invalid-feedback">Password is required.</div>
                            </div>
                            <button class="w-100 btn btn-lg btn-primary" type="submit" name="submit-btn" value="login-btn">Log in</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{{url_for('static', filename='js/bootstrap.bundle.min.js')}}"></script>
    <script>
        const themeBtn = document.getElementById('themeToggleBtn');
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        function updateIcon() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            themeBtn.innerHTML = isDark ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-stars-fill"></i>';
        }
        updateIcon();
        themeBtn.addEventListener('click', () => {
            const newTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon();
        });
        setTimeout(() => {
            document.querySelectorAll('.alert').forEach(alert => {
                new bootstrap.Alert(alert).close();
            });
        }, 3000);
        (function() {
            const forms = document.querySelectorAll('.needs-validation');
            Array.prototype.slice.call(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>
</body>
</html>
